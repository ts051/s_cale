        }

        function finishDayCardDragState() {
            if (!dayCardDragState) return null;
            const state = dayCardDragState;
            if (state.timer) clearTimeout(state.timer);
            document.removeEventListener('pointermove', state.onPointerMove);
            document.removeEventListener('pointerup', state.onPointerUp);
            document.removeEventListener('pointercancel', state.onPointerCancel);
            if (state.ghost) state.ghost.remove();
            setDayCardDropTarget('');
            dayCardDragState = null;
            return state;
        }

        function startDayCardDrag(state, pointerEvent) {
            state.active = true;
            suppressCalendarSwipeUntil = Date.now() + 1500;
            suppressDayCardClickUntil = Date.now() + 1000;
            state.ghost = state.item.cloneNode(true);
            state.ghost.classList.add('day-event-drag-ghost');
            state.ghost.style.width = `${Math.min(state.item.offsetWidth, window.innerWidth - 24)}px`;
            document.body.appendChild(state.ghost);
            hideDaySheetForDrag();
            updateDayCardDragGhost(state, pointerEvent.clientX, pointerEvent.clientY);
        }

        function attachDayCardDragHandlers(item, eventData) {
            item.classList.add('day-event-draggable');
            item.addEventListener('contextmenu', event => event.preventDefault());
            item.addEventListener('pointerdown', function(pointerEvent) {
                if (pointerEvent.button !== undefined && pointerEvent.button !== 0) return;
                const state = {
                    item,
                    eventData,
                    startX: pointerEvent.clientX,
                    startY: pointerEvent.clientY,
                    active: false,
                    targetDate: '',
                    ghost: null,
                    timer: null
                };

                state.onPointerMove = function(moveEvent) {
                    const distance = Math.hypot(moveEvent.clientX - state.startX, moveEvent.clientY - state.startY);
                    if (!state.active && distance > 10) {
                        finishDayCardDragState();
                        return;
                    }
                    if (state.active) {
                        moveEvent.preventDefault();
                        suppressCalendarSwipeUntil = Date.now() + 800;
                        updateDayCardDragGhost(state, moveEvent.clientX, moveEvent.clientY);
                    }
                };
                state.onPointerUp = function(upEvent) {
                    const finished = finishDayCardDragState();
                    if (!finished?.active) return;
                    upEvent.preventDefault();
                    suppressDayCardClickUntil = Date.now() + 800;
                    const targetDate = finished.targetDate || getCalendarDateFromPoint(upEvent.clientX, upEvent.clientY);
                    if (targetDate) {
                        openEventDragActionModal(finished.eventData, targetDate);
                    } else if (selectedDateStr) {
                        openDaySheet(selectedDateStr);
                    }
                };
                state.onPointerCancel = function() {
                    const finished = finishDayCardDragState();
                    if (finished?.active && selectedDateStr) openDaySheet(selectedDateStr);
                };

                dayCardDragState = state;
                document.addEventListener('pointermove', state.onPointerMove, { passive: false });
                document.addEventListener('pointerup', state.onPointerUp, { passive: false });
                document.addEventListener('pointercancel', state.onPointerCancel, { passive: false });
                state.timer = setTimeout(() => startDayCardDrag(state, pointerEvent), 500);
            });
        }

        function openEventDragActionModal(eventData, targetDate) {
            pendingDayCardDrop = { eventData, targetDate };
            const summary = document.getElementById('eventDragActionSummary');
            summary.textContent = `${eventData.title} → ${targetDate}`;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('eventDragActionModal').style.display = 'block';
            setEventDragActionBusy(false);
        }

        function setEventDragActionBusy(isBusy) {
            ['eventDragCopyButton', 'eventDragMoveButton'].forEach(id => {
                const button = document.getElementById(id);
                if (button) button.disabled = isBusy;
            });
        }

        function closeEventDragActionModal(reopenSheet) {
            document.getElementById('eventDragActionModal').style.display = 'none';
            pendingDayCardDrop = null;
            setEventDragActionBusy(false);
            if (reopenSheet && selectedDateStr) {
                openDaySheet(selectedDateStr);
                return;
            }
            if (document.getElementById('eventModal').style.display !== 'block' && !document.getElementById('daySheet').classList.contains('open')) {
                document.getElementById('overlay').style.display = 'none';
            }
        }

        function confirmDayCardDropAction(action) {
            if (!pendingDayCardDrop) return;
            const { eventData, targetDate } = pendingDayCardDrop;
            let payload;
            try {
                payload = buildPayloadForDayCardDrop(eventData, targetDate);
            } catch (error) {
                console.error(error);
                alert('予定の日付を変更できませんでした。');
                closeEventDragActionModal(true);
                return;
            }

            const eventId = eventData.extendedProps?.original_id || eventData.id;
            const isCopy = action === 'copy';
            const url = isCopy ? '/api/events' : `/api/events/${eventId}`;
            const method = isCopy ? 'POST' : 'PUT';
            setEventDragActionBusy(true);

            fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (!res.ok) throw new Error(`サーバーエラー (Status: ${res.status})`);
                return res.json();
            })
            .then(data => {
                if (!data.success) throw new Error(data.error || '保存に失敗しました');
                closeEventDragActionModal(false);
                return refreshEvents();
            })
            .then(() => openDaySheet(targetDate))
            .catch(err => {
                console.error(err);
                alert('予定を保存できませんでした。');
                setEventDragActionBusy(false);
            });
        }

        function filterModalLabels(isEdit, currentLabelId) {
            const isSharedChecked = document.getElementById('isShared').checked;
            const select = document.getElementById('eventLabelSelect');
            select.innerHTML = '';
            
            const filtered = cachedLabels
                .filter(l => isSharedChecked ? l.is_shared : !l.is_shared)
                .sort((a, b) => (a.sort_order || 999) - (b.sort_order || 999) || a.id - b.id);
            filtered.forEach(l => {
                const opt = document.createElement('option');
                opt.value = l.id;
                opt.innerText = l.name;
                select.appendChild(opt);
            });

            if (isEdit) {
                select.value = currentLabelId || '';
            } else {
                if (lastSelectedLabelId && filtered.some(l => l.id == lastSelectedLabelId)) {
                    select.value = lastSelectedLabelId;
                } else if (filtered.length > 0) {
                    select.value = filtered[0].id;
                } else {
                    select.value = '';
                }
            }
        }

        function loadLabels() {
            return fetchJsonWithCache('/api/labels')
                .then(data => {
                    cachedLabels = data;
                });
        }

        function renderLabelManagement() {
            const container = document.getElementById('labelMgmtList');
            container.innerHTML = '';
            if (cachedLabels.length === 0) {
                container.innerHTML = '<div style="font-size:13px; color:#70757a; text-align:center; padding: 10px;">ラベルがありません</div>';
                return;
            }

            const byOrder = (a, b) => (a.sort_order || 999) - (b.sort_order || 999) || a.id - b.id;
            const sharedLabels = cachedLabels.filter(l => l.is_shared).sort(byOrder);
            const privateLabels = cachedLabels.filter(l => !l.is_shared).sort(byOrder);

            const createHtml = (l, index, total, scope) => `
                <div class="label-mgmt-item" style="box-sizing: border-box;">
                    <div class="label-order-controls">
                        <button type="button" class="label-order-btn" title="上へ" onclick="moveLabel('${scope}', ${l.id}, -1)" ${index === 0 ? 'disabled' : ''}>^</button>
                        <button type="button" class="label-order-btn" title="下へ" onclick="moveLabel('${scope}', ${l.id}, 1)" ${index === total - 1 ? 'disabled' : ''}>v</button>
                    </div>
                    <input type="color" id="mgmtColor-${l.id}" value="${l.color}" style="width:24px; height:24px; border:none; padding:0; background:none; cursor:pointer; border-radius:50%; -webkit-appearance:none; appearance:none; flex-shrink:0;">
                    <input type="text" id="mgmtName-${l.id}" value="${l.name}">
                    <button class="btn btn-primary" style="font-size:12px; padding:4px 8px; cursor:pointer;" onclick="updateLabel(${l.id})">保存</button>
                    <button class="btn" style="font-size:12px; padding:4px 8px; background-color:#8f1f2d; color:white; cursor:pointer;" onclick="deleteLabel(${l.id})">削除</button>
                </div>
            `;

            if (sharedLabels.length > 0) {
                const heading = document.createElement('div');
                heading.style = 'font-size:13px; font-weight:bold; color:#5f6368; margin-top:8px; margin-bottom:4px;';
                heading.innerText = '■ 共有ラベル (全員に表示されます)';
                container.appendChild(heading);
                sharedLabels.forEach((l, index) => {
                    const temp = document.createElement('div');
                    temp.innerHTML = createHtml(l, index, sharedLabels.length, 'shared');
                    container.appendChild(temp.firstElementChild);
                });
            }

            if (privateLabels.length > 0) {
                const heading = document.createElement('div');
                heading.style = 'font-size:13px; font-weight:bold; color:#5f6368; margin-top:16px; margin-bottom:4px;';
                heading.innerText = '■ 個人ラベル (あなただけに表示されます)';
                container.appendChild(heading);
                privateLabels.forEach((l, index) => {
                    const temp = document.createElement('div');
                    temp.innerHTML = createHtml(l, index, privateLabels.length, 'private');
                    container.appendChild(temp.firstElementChild);
                });
            }
        }

        function moveLabel(scope, id, direction) {
            const isShared = scope === 'shared';
            const byOrder = (a, b) => (a.sort_order || 999) - (b.sort_order || 999) || a.id - b.id;
            const scopedLabels = cachedLabels.filter(l => isShared ? l.is_shared : !l.is_shared).sort(byOrder);
            const currentIndex = scopedLabels.findIndex(l => l.id === id);
            const nextIndex = currentIndex + direction;
            if (currentIndex < 0 || nextIndex < 0 || nextIndex >= scopedLabels.length) return;

            [scopedLabels[currentIndex], scopedLabels[nextIndex]] = [scopedLabels[nextIndex], scopedLabels[currentIndex]];
            scopedLabels.forEach((label, index) => { label.sort_order = index + 1; });
            renderLabelManagement();

            fetch('/api/labels/reorder', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_shared: isShared, label_ids: scopedLabels.map(l => l.id) })
            })
            .then(res => res.json())
            .then(data => {
                if (!data.success) throw new Error(data.error || 'Failed to reorder labels');
                return loadLabels();
            })
            .then(() => {
                filterModalLabels(document.getElementById('editingEventId').value !== '');
                renderLabelManagement();
                refreshEvents();
            })
            .catch(err => {
                console.error(err);
                loadLabels().then(renderLabelManagement);
            });
        }

        function addNewLabel() {
            const name = document.getElementById('newLabelName').value;
            const color = document.getElementById('newLabelColor').value;
            const is_shared = document.querySelector('input[name="newLabelScope"]:checked').value === 'shared';

            if (!name) {
                alert('ラベル名を入力してください');
                return;
            }

            fetch('/api/labels', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, color, is_shared })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    document.getElementById('newLabelName').value = '';
                    loadLabels().then(() => {
                        filterModalLabels(document.getElementById('editingEventId').value !== '');
                        renderLabelManagement();
                        refreshEvents();
                    });
                }
            });
        }

        function updateLabel(id) {
            const name = document.getElementById(`mgmtName-${id}`).value;
            const color = document.getElementById(`mgmtColor-${id}`).value;
            if(!name) return alert('名前を入力してください');

            fetch(`/api/labels/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, color })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    loadLabels().then(() => {
                        filterModalLabels(document.getElementById('editingEventId').value !== '');
                        renderLabelManagement();
                        refreshEvents();
                    });
                }
            });
        }

        function deleteLabel(id) {
            if(!confirm('このラベルを削除しますか？紐づく予定のカラーはデフォルトに戻ります。')) return;
            fetch(`/api/labels/${id}`, { method: 'DELETE' })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    loadLabels().then(() => {
                        filterModalLabels(document.getElementById('editingEventId').value !== '');
                        renderLabelManagement();
                        refreshEvents();
                    });
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {

            // 各種別画面・ドロワー内での上下スライド・ホイール操作の伝播を抑止してカレンダー移動の誤作動を防ぐ
            const stopPropagationFunc = function(e) { e.stopPropagation(); };

            drawerEl.addEventListener('touchstart', stopPropagationFunc, { passive: true });
            drawerEl.addEventListener('touchend', stopPropagationFunc, { passive: true });

            labelSectionEl.addEventListener('wheel', stopPropagationFunc, { passive: true });
            labelSectionEl.addEventListener('touchstart', stopPropagationFunc, { passive: true });
            labelSectionEl.addEventListener('touchend', stopPropagationFunc, { passive: true });

            settingsSectionEl.addEventListener('wheel', stopPropagationFunc, { passive: true });
            settingsSectionEl.addEventListener('touchstart', stopPropagationFunc, { passive: true });
            settingsSectionEl.addEventListener('touchend', stopPropagationFunc, { passive: true });

            lunaTreeSectionEl.addEventListener('wheel', stopPropagationFunc, { passive: true });
            lunaTreeSectionEl.addEventListener('touchstart', stopPropagationFunc, { passive: true });
            lunaTreeSectionEl.addEventListener('touchend', stopPropagationFunc, { passive: true });

            ['touchstart', 'touchmove', 'touchend', 'pointerdown', 'pointermove', 'pointerup', 'click'].forEach(eventName => {
                bottomSystemGestureGuardEl.addEventListener(eventName, function(e) {
                    e.stopPropagation();
                }, { passive: true });
            });

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ja',
                firstDay: 1,
                selectable: false,
                editable: false,
                displayEventTime: false,
                fixedWeekCount: true,
                expandRows: true,
                dayMaxEventRows: 5,
                moreLinkClick: function(info) {
                    const y = info.date.getFullYear();
                    const m = String(info.date.getMonth() + 1).padStart(2, '0');
                    const d = String(info.date.getDate()).padStart(2, '0');
                    openDaySheet(`${y}-${m}-${d}`);
                    return false;
                },
                dayHeaderFormat: { weekday: 'short' }, // 曜日を短縮一文字形式（月、火…）で上部に表示
                
                dayCellContent: function(e) { return e.dayNumberText.replace('日', ''); },

                eventOrder: function(a, b) {
                    const toEventTime = value => {
                        if (!value) return 0;
                        if (value instanceof Date) return value.getTime();
                        const parsed = new Date(value).getTime();
                        return Number.isFinite(parsed) ? parsed : 0;
                    };
                    let aHoliday = a.extendedProps?.is_holiday || 0;
                    let bHoliday = b.extendedProps?.is_holiday || 0;
                    if (aHoliday !== bHoliday) { return bHoliday - aHoliday; }
                    if (a.allDay !== b.allDay) { return a.allDay ? -1 : 1; }
                    const aStart = toEventTime(a.start);
                    const bStart = toEventTime(b.start);
                    if (aStart !== bStart) { return aStart - bStart; }
                    const aDuration = a.end && a.start ? toEventTime(a.end) - toEventTime(a.start) : 0;
                    const bDuration = b.end && b.start ? toEventTime(b.end) - toEventTime(b.start) : 0;
                    if (aDuration !== bDuration) { return bDuration - aDuration; }
                    const aId = String(a.extendedProps?.original_id || a.id || '');
                    const bId = String(b.extendedProps?.original_id || b.id || '');
                    if (aId !== bId) { return aId.localeCompare(bId, 'ja', { numeric: true }); }
                    return a.title.localeCompare(b.title, 'ja');
                },
                eventOrderStrict: true,

                customButtons: {
                    menuButton: {
                        text: '☰',
                        click: function() {
                            toggleDrawer(true);
                        }
                    }
                },
                headerToolbar: { left: 'menuButton', center: 'title', right: 'today' },
                // JavaScript側で一括供給するため、古い eventSources 設定は排除
                eventSources: [],
                eventClick: function(info) {
                    openDaySheet(info.event.startStr.split('T')[0]);
                    // 既存の予定データから繰り返し設定を復元してセット
                    const recurrenceVal = (info.event.extendedProps && info.event.extendedProps.recurrence) ? info.event.extendedProps.recurrence : '';
                    document.getElementById('eventRecurrence').value = recurrenceVal;
                },

                dateClick: function(info) {
                    if (isAnimating) return;
                    openDaySheet(info.dateStr);
                },

                eventClassNames: function(arg) {
                    if (arg.event.extendedProps.is_holiday) return ['fc-event-holiday'];
                    const classes = [];
                    if (isLunaTreeEvent({
                        title: arg.event.title,
                        start: arg.event.startStr,
                        end: arg.event.endStr,
                        extendedProps: arg.event.extendedProps
                    })) {
                        classes.push('fc-event-lunatree');
                        return classes;
                    }
                    if (arg.event.allDay) classes.push('fc-event-forced-all-day');
                    return classes;
                },

                eventDidMount: function(info) {
                    const eventData = {
                        title: info.event.title,
                        start: info.event.startStr,
                        end: info.event.endStr,
                        extendedProps: info.event.extendedProps
                    };
                    if (isLunaTreeEvent(eventData)) {
                        const meta = parseLunaTreeMeta(eventData);
                        if (meta?.planned) {
                            const titleEl = info.el.querySelector('.fc-event-title');
                            if (titleEl) titleEl.textContent = `${LUNA_TREE_TITLE} 予定`;
                        }
                    }
                    if (!info.event.extendedProps.is_holiday) {
                        const baseColor = info.event.backgroundColor || '#7a94a6';
                        info.el.style.setProperty('--fc-event-bg-alpha-color', hexToRgba(baseColor, 0.15));
                        info.el.style.setProperty('--fc-event-bg-solid-color', baseColor);
                        info.el.style.setProperty('--fc-event-text-solid-color', baseColor);
                    }
                },

                // カレンダー描画・月更新ごとに確実にタイトルタップイベントを紐付ける
                datesSet: function(info) {
                    const titleEl = calendarEl.querySelector('.fc-toolbar-title');
                    if (titleEl) {
                        // 重複作成を防止するため、すでに作成済みのpickerがないか確認する
                        let picker = calendarEl.querySelector('#dynamicMonthPicker');
                        if (!picker) {
                            picker = document.createElement('input');
                            picker.type = 'month';
                            picker.id = 'dynamicMonthPicker';
                            // 完全に非表示にしつつ、タップ領域として重ねるためのスタイル設定
                            picker.style.position = 'absolute';
                            picker.style.top = '0';
                            picker.style.left = '0';
                            picker.style.width = '100%';
                            picker.style.height = '100%';
                            picker.style.opacity = '0';
                            picker.style.cursor = 'pointer';
                            picker.style.zIndex = '10';
                            
                            // 親のchunk要素を基準位置に設定
                            if (titleEl.parentElement) {
                                titleEl.parentElement.style.position = 'relative';
                                titleEl.parentElement.appendChild(picker);
                            }

                            picker.addEventListener('change', function() {
                                if (picker.value) {
                                    calendar.gotoDate(picker.value + '-01');
                                }
                            });
                        }
                    }

                    if (currentUser && calendarDataInitialized) {
                        const rangeUrls = getCalendarRangeUrls();
                        if (rangeUrls.key !== currentDataRangeKey) {
                            refreshEvents();
                        }
                    }
                }
            });

            function changeMonthWithAnimation(direction) {
                if (isAnimating) return;
                isAnimating = true;
                closeAllModals();

                const outClass = direction === 'next' ? 'slide-up-out' : 'slide-down-out';
                const inClass = direction === 'next' ? 'slide-up-in' : 'slide-down-in';
                
                calendarEl.classList.add(outClass);

                setTimeout(() => {
                    if (direction === 'next') { calendar.next(); } else { calendar.prev(); }
                    calendarEl.classList.remove(outClass);
                    calendarEl.classList.add(inClass);

                    requestAnimationFrame(() => {
                        setTimeout(() => {
                            calendarEl.classList.remove(inClass);
                            setTimeout(() => { isAnimating = false; }, 250);
                        }, 20);
                    });
                }, 230);
            }

            calendarEl.addEventListener('wheel', function(e) {
                e.preventDefault();
                if (isAnimating) return;
                if (e.deltaY > 0) { changeMonthWithAnimation('next'); } else if (e.deltaY < 0) { changeMonthWithAnimation('prev'); }
            }, { passive: false });

            let touchStartY = 0;
            let touchEndY = 0;
            calendarEl.addEventListener('touchstart', function(e) { touchStartY = e.changedTouches[0].screenY; }, { passive: true });
            calendarEl.addEventListener('touchend', function(e) {
                if (Date.now() < suppressCalendarSwipeUntil) return;
                touchEndY = e.changedTouches[0].screenY;
                if (!isAnimating) {
                    const diff = touchStartY - touchEndY;
                    if (Math.abs(diff) > 45) {
                        if (diff > 0) { changeMonthWithAnimation('next'); } else { changeMonthWithAnimation('prev'); }
                    }
                }
            }, { passive: true });

            document.getElementById('startDay').addEventListener('change', function(e) {
                const previousValue = calendar.getOption('firstDay');
                const weekStart = parseInt(e.target.value, 10);
                calendar.setOption('firstDay', weekStart);
                fetch('/api/preferences', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ week_start: weekStart })
                }).then(res => {
                    if (!res.ok) throw new Error('設定を保存できませんでした。');
                    toggleDrawer(false);
                }).catch(() => {
                    calendar.setOption('firstDay', previousValue);
                    e.target.value = String(previousValue);
                    alert('週の開始曜日を保存できませんでした。');
                });
            });

            // SPA初期状態確認のトリガー
            checkAuthStatus();

            // ドロワーのダークモードチェックボックスの初期状態を同期
            document.getElementById('drawerDarkMode').checked = document.body.classList.contains('dark-mode');
            } catch (error) {
                console.error(error);
                showSection('login');
            }
        });

        function openDaySheet(dateStr) {
            selectedDateStr = dateStr;
            const parts = dateStr.split('-');
            document.getElementById('sheetDateTitle').innerText = `${parts[0]}年${parts[1]}月${parts[2]}日`;
            
            const dayEvents = allEvents.filter(e => {
                const sDate = e.start.split('T')[0];
                let eDate = e.end ? e.end.split('T')[0] : sDate;
                if (e.allDay && e.start !== eDate) {
                    eDate = adjustEndDateForUI(eDate, true);
                }
                return dateStr >= sDate && dateStr <= eDate;
            });
            // 統合された配列から現在の祝日を抽出
            const holidayEvents = cachedHolidays.filter(h => h.start === dateStr);
            
            let combinedList = [];
            holidayEvents.forEach(h => {
                combinedList.push({
                    id: null, title: h.title, start: h.start, end: h.end, allDay: true, color: 'transparent',
                    extendedProps: { is_holiday: 1, is_mine: false, is_shared: true }
                });
            });
            dayEvents.forEach(e => { combinedList.push(e); });
            
            combinedList.sort((a, b) => {
                let aHoliday = a.extendedProps?.is_holiday || 0;
                let bHoliday = b.extendedProps?.is_holiday || 0;
                if (aHoliday !== bHoliday) { return bHoliday - aHoliday; }
                if (a.allDay !== b.allDay) { return a.allDay ? -1 : 1; }
                const aLabelOrder = a.extendedProps?.label_order || 999;
                const bLabelOrder = b.extendedProps?.label_order || 999;
                if (aLabelOrder !== bLabelOrder) { return aLabelOrder - bLabelOrder; }
                if (a.start !== b.start) { return a.start < b.start ? -1 : 1; }
                return a.title.localeCompare(b.title, 'ja');
            });

            const listContainer = document.getElementById('sheetEventList');
            listContainer.innerHTML = "";

            if (combinedList.length === 0) {
                listContainer.innerHTML = `<div style="color:#70757a; font-size:13px; text-align:center; margin-top:20px;">予定はありません</div>`;
            } else {
                combinedList.forEach(ev => {
                    const item = document.createElement('div');
                    item.className = 'day-event-item';
                    
                    const isHoliday = ev.extendedProps?.is_holiday === 1;
                    const isLunaTree = isLunaTreeEvent(ev);
                    const lunaTreeMeta = isLunaTree ? parseLunaTreeMeta(ev) : null;
                    const displayTitle = isLunaTree && lunaTreeMeta?.planned ? `${LUNA_TREE_TITLE} 予定` : ev.title;
                    const eventColor = isHoliday ? '#d93025' : (ev.color || (ev.extendedProps.is_shared ? '#8fa89b' : '#7a94a6'));
                    const isMine = ev.extendedProps.is_mine;
                    
                    let rightInfoHtml = "";
                    if (isHoliday) {
                        rightInfoHtml = `<span style="font-size:11px; color:#d93025; font-weight:bold;">祝日</span>`;
                    } else if (isLunaTree) {
                        rightInfoHtml = `<span style="font-size:11px; color:#9aa0a6;">LunaTree</span>`;
                    }

                    let timeSuffixInfo = `<span style="font-size:11px; color:#70757a; font-weight:normal; margin-left:8px;">終日</span>`;
                    if (isHoliday) {
                        timeSuffixInfo = ""; 
                    } else if (isLunaTree) {
                        timeSuffixInfo = lunaTreeMeta?.planned ? "" : `<span style="font-size:11px; color:#70757a; font-weight:normal; margin-left:8px;">${lunaTreeMeta?.periodLength || 1}日間</span>`;
                    } else if (!ev.allDay && ev.start.includes('T')) {
                        const sTime = ev.start.split('T')[1].substring(0, 5);
                        const eTime = ev.end.includes('T') ? ev.end.split('T')[1].substring(0, 5) : "";
                        timeSuffixInfo = `<span style="font-size:12px; color:#2f6f4e; font-weight:normal; margin-left:8px;">${sTime}${eTime ? '～' + eTime : ''}</span>`;
                    }

                    item.innerHTML = `
                        <div style="display:flex; align-items:center; overflow:hidden; flex:1; justify-content:space-between; margin-right:12px;">
                            <div style="display:flex; align-items:center; overflow:hidden;">
                                <div class="day-event-dot" style="background-color: ${eventColor};"></div>
                                <span style="font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; ${isHoliday ? 'color:#d93025; font-weight:bold;' : ''}">${displayTitle}</span>
                            </div>
                            ${timeSuffixInfo}
                        </div>
                        ${rightInfoHtml}
                    `;
                    
                    if (!isHoliday && !isLunaTree && isDayCardEventDragAllowed(ev)) {
                        attachDayCardDragHandlers(item, ev);
                    }

                    if (isLunaTree) {
                        item.onclick = function() {
                            if (Date.now() < suppressDayCardClickUntil) return;
                            closeDaySheet();
                            openLunaTreeSPA();
                        };
                    } else if (!isHoliday) {
                        item.onclick = function() {
                            if (Date.now() < suppressDayCardClickUntil) return;
                            openEditModal(ev);
                        };
                    }
                    listContainer.appendChild(item);
                });
            }

            document.getElementById('overlay').style.display = 'block';
            const sheet = document.getElementById('daySheet');
            sheet.style.display = 'flex';
            setTimeout(() => sheet.classList.add('open'), 10);
        }

        function closeDaySheet() {
            const sheet = document.getElementById('daySheet');
            if (sheet.classList.contains('open')) {
                sheet.classList.remove('open');
                setTimeout(() => { sheet.style.display = 'none'; }, 250);
            }
            if(document.getElementById('eventModal').style.display !== 'block') {
                document.getElementById('overlay').style.display = 'none';
            }
        }

        function openRegisterModal(startStr, endStr) {
            document.getElementById('editingEventId').value = '';
            document.getElementById('btnDeleteModal').style.display = 'none';
            document.getElementById('eventStart').value = startStr;
            document.getElementById('eventEnd').value = endStr;
            document.getElementById('eventTitle').value = '';
            document.getElementById('isShared').checked = true;
            document.getElementById('isAllDay').checked = true;
            toggleTimeFields();
            filterModalLabels(false);
            
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('eventModal').style.display = 'block';
            setTimeout(() => document.getElementById('eventTitle').focus(), 50);
            // 繰り返し設定を「なし」にリセット
            document.getElementById('eventRecurrence').value = '';
            document.getElementById('eventMemo').value = '';
        }

        function openEditModal(ev) {
            document.getElementById('editingEventId').value = ev.extendedProps?.original_id || ev.id;
            document.getElementById('btnDeleteModal').style.display = 'block';
            document.getElementById('eventTitle').value = ev.title;
            document.getElementById('isShared').checked = ev.extendedProps.is_shared;
            document.getElementById('isAllDay').checked = ev.allDay;
            document.getElementById('eventRecurrence').value = ev.extendedProps?.recurrence || '';
            document.getElementById('eventMemo').value = ev.extendedProps?.memo || '';
            
            const startDateParts = ev.start.split('T');
            document.getElementById('eventStart').value = startDateParts[0];
            
            let displayEndDate = ev.end ? ev.end.split('T')[0] : startDateParts[0];
            if (ev.allDay && startDateParts[0] !== displayEndDate) {
                displayEndDate = adjustEndDateForUI(displayEndDate, true);
            }
            document.getElementById('eventEnd').value = displayEndDate;
            
            if (!ev.allDay && startDateParts[1]) {
                document.getElementById('startTime').value = startDateParts[1].substring(0, 5);
                if (ev.end && ev.end.includes('T')) {
                    document.getElementById('endTime').value = ev.end.split('T')[1].substring(0, 5);
                }
            } else {
                document.getElementById('startTime').value = "09:00";
                document.getElementById('endTime').value = "10:00";
            }
            
            toggleTimeFields();
            
            const currentLabelId = ev.label_id || (ev.extendedProps && ev.extendedProps.label_id);
            filterModalLabels(true, currentLabelId);
            
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('eventModal').style.display = 'block';
        }

        function openRegisterFormFromSheet() { 
            openRegisterModal(selectedDateStr, selectedDateStr);
            // 繰り返し設定を「なし」にリセット
            document.getElementById('eventRecurrence').value = '';
        }

        function closeRegisterModal() {
            document.getElementById('eventModal').style.display = 'none';
            if (calendar) { calendar.unselect(); }
            if (!document.getElementById('daySheet').classList.contains('open')) {
                document.getElementById('overlay').style.display = 'none';
            }
        }
        function closeAllModals() { closeDaySheet(); closeRegisterModal(); closeEventDragActionModal(false); }

        function setEventSaveBusy(isBusy) {
            isSavingEvent = isBusy;
            const saveButton = document.getElementById('btnSaveEventModal');
            if (saveButton) {
                saveButton.disabled = isBusy;
            }
        }

        function saveEvent() {
            if (isSavingEvent) return;

            const titleVal = document.getElementById('eventTitle').value.trim();

            if (!titleVal) {
                alert('タイトルを入力してください。');
                return;
            }

            const startDateVal = document.getElementById('eventStart').value;
            const endDateVal = document.getElementById('eventEnd').value;

            if (!startDateVal || !endDateVal) {
                alert('日時を入力してください。');
                return;
            }

            const isAllDay = document.getElementById('isAllDay').checked;

            let startVal = startDateVal;
            let endVal = endDateVal;

            if (isAllDay) {
                endVal = addDaysToDateStr(endDateVal, 1);
            } else {
                const startTimeVal = document.getElementById('startTime').value || '09:00';
                const endTimeVal = document.getElementById('endTime').value || '10:00';

                startVal = `${startDateVal}T${startTimeVal}:00`;
                endVal = `${endDateVal}T${endTimeVal}:00`;
            }

            const isShared = document.getElementById('isShared').checked;
            const labelIdVal = document.getElementById('eventLabelSelect').value || null;
            const recurrenceVal = document.getElementById('eventRecurrence').value;
            const memoVal = document.getElementById('eventMemo').value;

            const payload = {
                title: titleVal,
                start: startVal,
                end: endVal,
                memo: memoVal,
                allDay: isAllDay,
                is_all_day: isAllDay,
                label_id: labelIdVal,
                is_shared: isShared,
                recurrence: recurrenceVal
            };

            const eventId = document.getElementById('editingEventId').value;

            const url = eventId
                ? `/api/events/${eventId}`
                : '/api/events';

            const method = eventId
                ? 'PUT'
                : 'POST';

            setEventSaveBusy(true);

            fetch(url, {
                method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error(`サーバーエラー (Status: ${res.status})`);
                }
                return res.json();
            })
            .then(data => {
                if (data.success) {
                    closeRegisterModal();
                    refreshEvents().then(() => {
                        if (document.getElementById('daySheet').classList.contains('open') && selectedDateStr) {
                            openDaySheet(selectedDateStr);
                        }
                    });
                } else {
                    alert('保存に失敗しました: ' + (data.error || '不明なエラー'));
                }
            })
            .catch(err => {
                console.error(err);
                alert('通信エラーが発生しました。');
            })
            .finally(() => {
                setEventSaveBusy(false);
            });
        }

        function deleteEventFromModal() {
            const editingId = document.getElementById('editingEventId').value;
            if (!editingId) return;
            if (!confirm("この予定を削除しますか？")) return;

            fetch(`/api/events/${editingId}`, { method: 'DELETE' })
            .then(res => {
                if (res.ok) {
                    refreshEvents().then(() => {
                        closeRegisterModal();
                        if (document.getElementById('daySheet').classList.contains('open')) {
                            openDaySheet(selectedDateStr);
                        }
                    });
                } else {
                    alert("サーバー側での削除に失敗しました。");
                }
            })
            .catch(err => {
                console.error(err);
                alert("通信エラーが発生しました。");
            });
        }

        function refreshEvents() {
            const rangeUrls = getCalendarRangeUrls();
            currentDataRangeKey = rangeUrls.key;
            return Promise.all([
                fetchJsonWithCache(rangeUrls.holidays).then(value => ({ ok: true, value }), reason => ({ ok: false, reason })),
                fetchJsonWithCache(rangeUrls.events).then(value => ({ ok: true, value }), reason => ({ ok: false, reason }))
            ])
            .then(([holidaysResult, eventsResult]) => {
                if (!eventsResult.ok) {
                    console.error("予定の更新に失敗しました:", eventsResult.reason);
                    return;
                }

                const holidaysData = holidaysResult.ok ? holidaysResult.value : [];
                if (!holidaysResult.ok) {
                    console.error("祝日の更新に失敗しました:", holidaysResult.reason);
                }
                renderCalendarData(holidaysData, eventsResult.value);
            });
        }

        function applyFilter() {
            const filterValue = document.querySelector('input[name="viewFilter"]:checked').value;
            const currentSources = calendar.getEventSources();
            currentSources.forEach(source => { if (!source.url) { source.remove(); } });

            // 1. 通常の予定をフィルター
            const filteredEvents = allEvents.filter(event => {
                if (filterValue === 'shared') { return event.extendedProps.is_shared === true; }
                if (filterValue === 'private') { return event.extendedProps.is_shared === false; }
                return true;
            });

            // ダークモード状態に応じて祝日データの適用色を動的に変更する
            const isDarkMode = document.body.classList.contains('dark-mode');
            const holidayColor = isDarkMode ? '#b31412' : '#d93025';
            
            const updatedHolidays = cachedHolidays.map(h => {
                return { 
                    ...h, 
                    color: holidayColor,
                    backgroundColor: holidayColor
                };
            });


            // 2. 祝日データを合流させた1つの共通の配列（イベントソース）を作成して供給
            // 祝日は選択されているフィルター（すべて表示、共有、個人）に関わらず、常に合流させます
            let combinedSources = [];
            combinedSources = filteredEvents.concat(updatedHolidays);
            calendar.addEventSource(combinedSources);
        }

        function deleteAllEvents() {
            if (!confirm("すべての予定を削除しますか？\nこの操作は取り消せません。")) return;
            if (!confirm("本当に本当によろしいですか？\n（あなたに閲覧権限のあるすべての予定データが消去されます）")) return;

            fetch('/api/events/clear', { method: 'DELETE' })
            .then(res => {
                if (!res.ok) { throw new Error(`サーバーエラー (Status: ${res.status})`); }
                return res.json();
            })
            .then(data => {
                if (data.success) {
                    alert("すべての予定を削除しました。");
                    toggleDrawer(false);
                    refreshEvents();
                } else {
                    alert("削除に失敗しました: " + (data.error || "不明なエラー"));
                }
            })
            .catch(err => {
                console.error(err);
                alert("一括削除処理中にエラーが発生しました。");
            });
        }

        window.addEventListener('online', () => {
            setOfflineStatus(false);
            if (currentUser) refreshEvents();
        });
        window.addEventListener('offline', () => setOfflineStatus(true));

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (sessionStorage.getItem('whiteTree:swReloaded') === '1') return;
                sessionStorage.setItem('whiteTree:swReloaded', '1');
                window.location.reload();
            });
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js', { scope: './' })
                    .then(registration => {
                        if (registration && typeof registration.update === 'function') {
                            registration.update();
                        }
                    })
                    .catch(error => console.warn('Service Worker registration failed:', error));
            });
        }
    </script>
</body>
</html>
